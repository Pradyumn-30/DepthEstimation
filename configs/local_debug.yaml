# Phase 1: M4 base (16GB unified memory) local verification config
# Goal: Verify pipeline correctness, NOT produce good depth
model:
  encoder: resnet18
  pretrained: true
  num_scales: 4            # Multi-scale disparity outputs (scales 0-3)
  frame_ids: [0, -1, 1]   # Target frame + 2 source frames

data:
  dataset: kitti
  split: eigen_curated
  data_path: data/kitti_raw
  height: 128
  width: 416
  num_workers: 2           # Base M4 has 10 CPU cores, keep conservative

training:
  batch_size: 4            # Conservative for 16GB unified memory
  learning_rate: 1.0e-4
  num_epochs: 20            # Extended to full run
  scheduler_step: 15        # LR drop at epoch 15
  scheduler_gamma: 0.1
  log_frequency: 50        # Log every N batches
  save_frequency: 1        # Checkpoint every epoch

loss:
  ssim_weight: 0.85        # α in (α·SSIM + (1-α)·L1)
  smoothness_weight: 1.0e-3
  auto_mask: true
  min_reprojection: true

augmentation:
  horizontal_flip: 0.5
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1

device: auto               # MPS if available, else CPU
